name: vpet_flutter
description: Cross-platform VPet runtime prototype (Flutter).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/mu/manifest.json
    - assets/mu/frames/default/
    - assets/mu/frames/move/
    - assets/mu/frames/sleep/
